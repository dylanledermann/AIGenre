# Postgres DB
spring:
    application:
        name: ai-genre
    data:
        redis:
            cache:
                host: ${REDIS_CACHE_HOST}
                port: ${REDIS_PORT}
                database: 0
                ttl: 3600000
            broker:
                host: ${REDIS_BROKER_HOST}
                port: ${REDIS_PORT}
                database: 0
                ttl: 3600000
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}

        hikari:
            maximum-pool-size: 10
            minimum-idle: 5
            connection-timeout: 30000
            idle-timeout: 600000
            max-lifetime: 1800000
            initialization-fail-time: 10000
    flyway:
        location: classpath:db/migration
    websocket:
        allowed-origins:
            - localhost
    jpa:
        hibernate:
            # Hibernate only validates the db format matches the java code (flyway creates the db)
            ddl-auto: validate
    grpc:
        client:
            channels:
                celery-worker:
                    address: 0.0.0.0:8000