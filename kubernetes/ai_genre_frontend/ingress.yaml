# Frontend Gateway Class
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: frontendgatewayclass
spec:
  controllerName: example.com/gateway-controller
--- # Frontend Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: frontendgateway
  namespace: frontend
spec:
  gatewayClassName: frontendgatewayclass
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: same
--- # Frontend HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontendhttproute
  namespace: frontend
spec:
  parentRefs:
  - name: frontendgateway
  hostnames:
  - example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80