# gRPC Cluster IP
apiVersion: v1
kind: Service
metadata:
  name: grpc
  namespace: celery
spec:
  clusterIP: None # Headless service to load balance GRPC server and prevents only 1 IP address
  selector:
    app: grpc
  ports:
  - protocol: TCP
    port: 50051
    targetPort: 50051
    appProtocol: grpc
--- # gRPC Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc
  namespace: celery
  labels:
    app: grpc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpc
  template:
    metadata:
      labels:
        app: grpc
    spec:
      containers:
      - name: grpc
        image: dylhead/ai-genre-grpc
        ports:
        - containerPort: 50051
        envFrom:
        - secretRef:
            name: celery # Uses the same .env as the celery worker, should be changed in prod to only know rabbitmq connection.
