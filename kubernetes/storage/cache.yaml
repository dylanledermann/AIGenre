# Redis cache service for the application
apiVersion: v1
kind: Service
metadata:
  name: cache-redis
  namespace: backend
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: redis
--- # Redis ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-redis-config
  namespace: backend
  labels:
    app: redis
data:
  master.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300
    daemonize no
    supervised no
    pidfile /var/run/redis_6379.pid
    loglevel notice
    logfile ""
  slave.conf: |
    slaveof redis-0.redis 6379
--- # Redis Cache
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache-redis
  namespace: backend
  labels:
    app: redis
spec:
  serviceName: cache-redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:latest
        command: ["redis-server"]
        args: ["/etc/redis.conf"]
        env:
        - name: ALLOW_EMPTY_PASSWORD
          value: "yes"
        ports:
        - name: redis
          containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        - name: conf
          mountPath: /etc/redis.conf
          subPath: redis.conf
      initContainers:
      - name: initredis
        image: redis:latest
        command:
        - bash
        - "-c"
        - |
          [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          if [[ $ordinal -eq 0 ]]; then
            cp /mnt/config-map/master.conf /etc/redis.conf
          else
            cp /mnt/config-map/slave.conf /etc/redis.conf
          fi
        volumeMounts:
        - name: conf
          mountPath: /etc/redis.conf
          subPath: redis.conf
        - name: config-map
          mountPath: /mnt/config-map
      volumes:
      - name: redis-data
        emptyDir: {}
      - name: conf
        emptyDir: {}
      - name: config-map
        configMap:
          name: cache-redis-config