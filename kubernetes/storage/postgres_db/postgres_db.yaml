# Postgres Secret
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: backend
type: kubernetes.io/basic-auth
stringData:
  username: user
  password: password
  database: genre_db
---
# Postgres DB
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: backend
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  affinity: {}
  bootstrap:
    initdb:
      secret:
        name: postgres
  
  ephemeralVolumesSizeLimit:
    temporaryData: 2Gi
    shm: 1Gi
  storage:
    size: 5Gi # 5 Gibibytes of storage
    storageClass: local-path