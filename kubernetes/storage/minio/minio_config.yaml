objectStore:
   name: miniostorage # name of the AIStor Server
   pools:
   - name: pool-0
     servers: 1 # Number of servers/pods to deploy
     volumesPerServer: 2 # Number of Persistent Volumes per Server/Pod
     size: 2Gi # Size of each PV (2 Gegibytes)
   storageClassName: directpv-min-io # Storage Class assigned to each PV
   services:
      minio:
         serviceType: NodePort
         nodePort: 31000 # Select an available NodePort in the supported range of 30000-32767