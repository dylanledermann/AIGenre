apiVersion: aistor.min.io/v1
kind: ObjectStore
metadata:
  name: miniostorage
  namespace: celery
  labels:
    app: minio
spec:
  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 4
      volumesClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce # Only one node has read/write access
          storageClass: directpv-min-io
          resources:
            requests:
              storage: 2Gi # 2 Gibibytes